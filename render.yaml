services:
  - type: web
    name: Eidaah-Backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://eidaah-jgqp.vercel.app
      # Render proxies to us, so the real client IP is in X-Forwarded-For.
      # Without this every request keys on the proxy address and one busy
      # student would rate-limit the whole app.
      - key: TRUST_PROXY
        value: "true"
